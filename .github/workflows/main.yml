name: Build Bharat AI Pilot APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Set up Java Development Kit
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Gradle Build Tool Environment
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.2

    - name: Compile and Build Android APK File
     run: gradle assemble --no-daemon

    - name: Upload Finished App Installer
      uses: actions/upload-artifact@v4
      with:
        name: Bharat-AI-Pilot-App
        path: "**/build/outputs/apk/debug/*.apk"

